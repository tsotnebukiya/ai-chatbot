name: Deploy to Production
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reset_db:
        description: 'Run database reset before migrating'
        required: false
        default: false
        type: boolean

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  deploy:
    runs-on: ubuntu-22.04
    needs: lint
    concurrency:
      group: deploy-${{ github.sha }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/ai-chatbot:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /opt/ai-chatbot

      - name: Upload docker-compose definition
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: 'docker-compose.prod.yml'
          target: '/opt/ai-chatbot/'
          timeout: 300s

      - name: Determine database actions
        id: dbflag
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_MESSAGE: ${{ github.event.head_commit.message || '' }}
          REF: ${{ github.ref }}
          RESET_INPUT: ${{ github.event.inputs.reset_db || 'false' }}
        run: |
          set -euo pipefail

          run_reset=false

          if [[ "$RESET_INPUT" == "true" ]]; then
            run_reset=true
          elif [[ "$EVENT_NAME" == "push" && "$HEAD_MESSAGE" == *"[reset-db]"* ]]; then
            run_reset=true
          elif [[ "$REF" == refs/tags/reset-db* ]]; then
            run_reset=true
          fi

          echo "run_reset=$run_reset" >> "$GITHUB_OUTPUT"
          echo "DEBUG: EVENT_NAME=$EVENT_NAME"
          echo "DEBUG: HEAD_MESSAGE=$HEAD_MESSAGE"
          echo "DEBUG: RESET_INPUT=$RESET_INPUT"
          echo "DEBUG: run_reset=$run_reset"

      - name: Deploy to droplet
        uses: appleboy/ssh-action@v1.0.0
        env:
          RUN_RESET: ${{ steps.dbflag.outputs.run_reset }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/ai-chatbot
            export BLOB_READ_WRITE_TOKEN=${{ secrets.BLOB_READ_WRITE_TOKEN }}
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export BETTER_AUTH_URL=${{ secrets.BETTER_AUTH_URL }}
            export MISTRAL_API_KEY=${{ secrets.MISTRAL_API_KEY }}
            export BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
            docker compose -f docker-compose.prod.yml down
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ai-chatbot:latest
            docker compose -f docker-compose.prod.yml up -d
            echo "RUN_RESET value: ${RUN_RESET}"
            if [ "${RUN_RESET}" = "true" ]; then
              echo "Running database reset..."
              docker compose -f docker-compose.prod.yml exec -T app pnpm db:reset
            else
              echo "Skipping database reset (RUN_RESET=${RUN_RESET})"
            fi
            echo "Running database migration..."
            docker compose -f docker-compose.prod.yml exec -T app pnpm db:migrate
